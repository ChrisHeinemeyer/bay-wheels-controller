name: Deploy web setup

on:
  # Web-only changes: deploy immediately
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-web.yml"
  # Tag push: wait for Release (firmware build) to finish, then deploy
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    # When triggered by workflow_run, only deploy if Release succeeded
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Bundle GBFS station data
        run: |
          mkdir -p web/public/gbfs
          curl -fsSL -o web/public/gbfs/station_information.json \
            "https://gbfs.lyft.com/gbfs/2.3/bay/en/station_information.json"

      - name: Install and build
        run: |
          cd web
          npm ci
          GITHUB_PAGES=1 npm run build

      - name: Download firmware
        run: |
          # workflow_run = Release just finished; push = web-only update.
          # In both cases, latest is correct (Release uploads before we run).
          curl -fsSL -o web/dist/firmware-bay-wheels-controller.bin \
            "https://github.com/ChrisHeinemeyer/bay-wheels-controller/releases/latest/download/firmware-bay-wheels-controller.bin"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
