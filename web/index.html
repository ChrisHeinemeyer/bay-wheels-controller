<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bay Wheels Controller</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="safariErr" style="display: none;">
      This tool is not supported on Safari browser!
    </div>
    <div id="main">
      <header>
        <h1>Bay Wheels Controller</h1>
      </header>

      <nav class="tabs">
        <button class="tab active" data-tab="flash">1 · Flash</button>
        <button class="tab" data-tab="wifi">2 · WiFi Setup</button>
      </nav>

      <!-- Tab 1: Flash -->
      <div id="flashTab">
        <section class="card">
          <div class="connect-row">
            <span id="lblConnTo" style="display: none;"></span>
            <button type="button" id="connectButton" class="btn btn-primary">Connect</button>
            <button type="button" id="disconnectButton" class="btn" style="display: none;">Disconnect</button>
          </div>

          <div id="flashOptions" style="display: none;">
            <div class="firmware-source">
              <label><input type="radio" name="firmware" value="download" checked /> Use latest release from GitHub</label>
              <label><input type="radio" name="firmware" value="file" /> Upload a .bin file: <input type="file" id="firmwareFile" accept=".bin" /></label>
            </div>
            <div class="actions">
              <button type="button" id="programButton" class="btn btn-primary">Program</button>
              <span class="progress-cell" id="progress0"></span>
            </div>
          </div>
        </section>

        <section class="card console-card">
          <h2>Console</h2>
          <pre id="terminal"></pre>
        </section>
      </div>

      <!-- Tab 2: WiFi Setup -->
      <div id="wifiTab" style="display: none;">
        <section class="card">
          <div id="wifiInstructions" class="instructions" style="display: none;">
            <p id="wifiInstructionsText"></p>
            <button type="button" id="wifiConnectBtn" class="btn btn-primary" style="display: none;">
              Connect to Device
            </button>
          </div>

          <div id="wifiForm">
            <div class="field-group">
              <label for="ssidInput">WiFi Network</label>
              <input type="text" id="ssidInput" placeholder="Network name"
                     autocomplete="off" spellcheck="false" />
            </div>
            <div class="field-group">
              <label for="passwordInput">Password</label>
              <input type="password" id="passwordInput" placeholder="Leave blank if open network"
                     autocomplete="off" />
            </div>
            <button type="button" id="wifiConfigBtn" class="btn btn-primary">
              Configure WiFi
            </button>
          </div>

          <div id="wifiStatus" style="display: none;" class="status-row">
            <span class="spinner" id="wifiSpinner" style="display: none;"></span>
            <span class="status-icon" id="wifiStatusIcon" style="display: none;"></span>
            <span id="wifiStatusText"></span>
          </div>
        </section>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
